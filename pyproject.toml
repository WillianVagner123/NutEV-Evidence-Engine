[build-system]
requires = ["pdm-backend>=2.4.3"]
build-backend = "pdm.backend"

[project]
name = "nutev-nutmev"
dynamic = ["version"]
description = "NutEV/NutMEV reproducible evidence engine for lifestyle nutrition research and candidate protocol recommendations"
readme = "README.md"
requires-python = ">=3.12,<3.15"
license = {file = "LICENSE"}
authors = [
    {name = "NutEV/NutMEV Project"},
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Topic :: Scientific/Engineering :: Information Analysis",
]
dependencies = [
    "langchain~=1.2",
    "langchain-community~=0.4",
    "langchain-core~=1.2",
    "langchain-ollama~=1.0",
    "langchain-openai~=1.1",
    "langchain-anthropic~=1.3",
    "duckduckgo-search~=8.1",
    "python-dateutil~=2.9",
    "typing-extensions~=4.15",
    "justext~=3.0",
    "readabilipy~=0.3",
    "trafilatura~=2.0",
    "extruct~=0.18",
    "beautifulsoup4~=4.14",
    "flask~=3.1.3",
    "werkzeug~=3.1.6",
    "flask-cors~=6.0",
    "flask-socketio~=5.6.1",
    "alembic~=1.17",
    "sqlalchemy~=2.0",
    "sqlalchemy-utc~=0.14",
    "wikipedia~=1.4",
    "arxiv~=2.4",
    "pypdf~=6.10.1",
    "pydantic~=2.12",
    "pydantic-settings~=2.12",
    "toml~=0.10",
    "platformdirs~=4.5",
    "dynaconf~=3.2",
    "requests>=2.32",
    "urllib3~=2.6",
    "tiktoken~=0.12",
    "xmltodict~=1.0",
    "lxml>=5.3",
    "newspaper4k~=0.9",
    "defusedxml~=0.7",
    "nh3~=0.3",
    "pdfplumber~=0.11",
    "google-search-results~=2.4",
    "jaraco-context~=6.1",
    "flask-wtf~=1.2",
    "methodtools~=0.4",
    "loguru~=0.7",
    "cachetools~=7.0",
    "matplotlib~=3.10",
    "pandas~=3.0",
    "plotly~=6.5",
    "kaleido~=1.2",
    "aiohttp~=3.13",
    "tenacity~=9.1",
    "apscheduler~=3.11",
    "rich~=14.3",
    "click~=8.3",
    "flask-login~=0.6",
    "flask-limiter~=4.1",
    "sqlcipher3-binary~=0.6; sys_platform == \"linux\" and platform_machine == \"x86_64\"",
    "sqlcipher3~=0.6; (platform_machine == \"aarch64\" or platform_machine == \"arm64\") and sys_platform == \"linux\"",
    "sqlcipher3~=0.6; sys_platform != \"linux\"",
    "lxml-html-clean>=0.4.4",
    "Pillow>=12.1.1",
    "cryptography>=46.0.7",
    "apprise~=1.9",
    "markdown~=3.10",
    "pypandoc-binary~=1.16",
    "langchain-experimental~=0.4",
]

[project.optional-dependencies]
mcp = [
    "mcp[cli]~=1.2",
]
dashboard = [
    "streamlit",
    "pandas",
    "openpyxl",
]
platform = [
    "fastapi",
    "uvicorn",
    "pandas",
    "openpyxl",
    "jinja2",
]
# Heavy/optional features. The default `pip install` stays lean; install an
# extra only for the capability you need. All are lazily imported and degrade
# gracefully when absent.
semantic = [
    # Embeddings-based retrieval for `nutev ask` (pulls torch). Falls back to
    # deterministic TF-IDF keyword retrieval when not installed.
    "sentence-transformers~=5.2",
    "faiss-cpu~=1.13",
]
kb = [
    # Parquet export of the knowledge base (corpus.parquet). JSONL/CSV always work.
    "pyarrow~=23.0",
]
all = [
    "nutev-nutmev[semantic,kb]",
]

[project.urls]
"Homepage" = "https://github.com/WillianVagner123/NUT-MEV_NEW"
"Bug Tracker" = "https://github.com/WillianVagner123/NUT-MEV_NEW/issues"
"Validation Report" = "https://github.com/WillianVagner123/NUT-MEV_NEW/blob/main/docs/VALIDATION_REPORT.md"

[project.scripts]
nutev = "nutev.cli:main"

[tool.pdm]
distribution = true
version = { source = "file", path = "src/nutev/__init__.py" }

[[tool.pdm.source]]
url = "https://download.pytorch.org/whl/cpu"
name = "torch"
include_packages = ["torch", "torch*"]

[tool.pdm.resolution.overrides]
requests = ">=2.33"
lxml = ">=6.0"

[dependency-groups]
dev = [
    "virtualenv~=20.36",
    "pre-commit~=4.5",
    "cookiecutter~=2.6",
    "pytest-mock~=3.15",
    "pytest~=9.0",
    "pytest-cov~=7.0",
    "pytest-timeout~=2.4",
    "pytest-asyncio~=1.3",
    "pytest-xdist~=3.8",
    "ruff~=0.15",
    "freezegun~=1.5",
    "mypy~=1.19",
    "types-requests~=2.32",
    "types-toml~=0.10",
    "types-flask~=1.1",
    "hypothesis~=6.151",
    "vulture~=2.14",
    "towncrier~=24.8",
]

[tool.pytest.ini_options]
testpaths = ["nutev_tests"]
markers = [
    "requires_llm: marks tests that require a real LLM (not fallback)",
    "integration: marks integration tests",
    "slow: marks slow tests",
    "asyncio: marks async tests that use asyncio",
]
timeout = 60
timeout_method = "thread"

[tool.coverage.run]
source = ["src"]
branch = true
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "*/migrations/*",
    "*/strategies/*",
    "*/cli.py",
    "*/cli/*",
    "*/visualization.py",
    "*/answer_decoding/*",
]
