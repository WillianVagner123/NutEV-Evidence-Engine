# Dependabot configuration for the NutEV Evidence Engine.
# Goal: keep security/dependency maintenance visible WITHOUT flooding the PR queue
# (a repository cited in an academic article must not look abandoned under a wall
# of open bot PRs). Updates are grouped, capped and run monthly.
# npm/docker ecosystems were removed together with the legacy frontend, Docker
# infra and legacy tests.

version: 2
updates:
  # Python dependencies - monthly, grouped into a single PR.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    groups:
      python-runtime:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"
      include: "scope"

  # GitHub Actions - monthly, grouped into a single PR.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"
      include: "scope"
