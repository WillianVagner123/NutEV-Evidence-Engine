# Dependabot configuration for NutEV/NutMEV
# Goal: keep security/dependency maintenance visible without flooding the PR queue.
# npm/docker ecosystems were removed together with the legacy frontend, Docker
# infra and legacy tests.

version: 2
updates:
  # Python dependencies - weekly, grouped
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "python"
    groups:
      python-runtime:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"
      include: "scope"

  # GitHub Actions - monthly
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore"
      include: "scope"
