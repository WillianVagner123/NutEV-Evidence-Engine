name: "Methodology change"
description: "Propose a change to methodology, rules, scoring, or ontology"
labels: ["methodology"]
body:
  - type: markdown
    attributes:
      value: |
        Methodological changes must be versioned and justified. Link to the
        relevant methodology docs and rule/config files.
  - type: textarea
    id: change
    attributes:
      label: Proposed methodological change
      description: What should change and why (scientific rationale)?
    validations:
      required: true
  - type: textarea
    id: affected
    attributes:
      label: Affected artifacts
      description: "Which files/config? e.g. config/scoring_rules.json, config/nutev_ontology.json, docs/…"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Supporting evidence
      description: DOIs / official URLs / metadata. Do not paste protected full texts.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected impact & traceability
      description: How does this affect claims, scores, or candidates? How is it versioned?
    validations:
      required: true
  - type: checkboxes
    id: guardrails
    attributes:
      label: Guardrails
      options:
        - label: Change will be recorded in the methodology changelog and versioned.
        - label: Change does not let an LLM define final approval.
        - label: Conflicts remain visible (not hidden/averaged away).
        - label: Final decisions still require human review.
