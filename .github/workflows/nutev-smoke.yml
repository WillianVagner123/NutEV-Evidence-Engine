name: nutev-smoke

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pypdf beautifulsoup4
      - name: Import pipeline smoke test
        run: PYTHONPATH=src python -c "from nutev.pipelines.master_pipeline import run_pipeline; print('ok')"