name: nutev-smoke

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install project and smoke deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements/nutev-ci.txt ]; then
            python -m pip install -r requirements/nutev-ci.txt
          else
            python -m pip install \
              'requests>=2.32' \
              'pandas>=2.2' \
              'pypdf>=5.0' \
              'beautifulsoup4>=4.12' \
              'pydantic>=2.10' \
              'openpyxl>=3.1' \
              'pytest>=8.0' \
              'pytest-timeout>=2.3' \
              'pytest-mock>=3.14' \
              'pytest-asyncio>=0.23' \
              'freezegun>=1.5'
          fi
          python -m pip install --no-deps -e .
      - name: Import pipeline smoke test
        run: PYTHONPATH=src python -c "from nutev.pipelines.master_pipeline import run_pipeline; print('ok')"