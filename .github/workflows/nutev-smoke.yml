name: nutev-smoke

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project and smoke deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/nutev-ci.txt
          pip install --no-deps -e .
      - name: Import pipeline smoke test
        run: PYTHONPATH=src python -c "from nutev.pipelines.master_pipeline import run_pipeline; print('ok')"