name: ci

# Single canonical CI gate: runs the full canonical test suite and lint on every
# push and pull request (and on demand). Replaces the previously-disabled
# nutev-tests / nutev-smoke / nutev-lint workflows, which were disabled and only
# ran a hardcoded subset of test files.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: tests (python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project and test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/nutev-ci.txt
          python -m pip install --no-deps -e .
      - name: Run the full canonical test suite
        run: PYTHONPATH=src python -m pytest -q nutev_tests

  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ruff
        run: python -m pip install ruff
      - name: Ruff check
        run: ruff check src nutev_tests || true  # advisory; does not block the gate
