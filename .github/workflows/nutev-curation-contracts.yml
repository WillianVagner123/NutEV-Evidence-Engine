name: NutEV Curation Contracts

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/nutev/export/**"
      - "src/nutev/analysis/**"
      - "src/nutev/pipelines/**"
      - "nutev_tests/test_curation_outputs.py"
      - "nutev_tests/test_metadata_master_contract.py"
      - "nutev_tests/test_prisma_flow.py"
      - "nutev_tests/test_master_pipeline_dedup.py"
      - ".github/workflows/nutev-curation-contracts.yml"
  push:
    branches:
      - main
      - "codex/**"
    paths:
      - "src/nutev/export/**"
      - "src/nutev/analysis/**"
      - "src/nutev/pipelines/**"
      - "nutev_tests/test_curation_outputs.py"
      - "nutev_tests/test_metadata_master_contract.py"
      - "nutev_tests/test_prisma_flow.py"
      - "nutev_tests/test_master_pipeline_dedup.py"
      - ".github/workflows/nutev-curation-contracts.yml"

jobs:
  curated-export-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          python -m pip install -e .
          python -m pip install pytest pandas openpyxl

      - name: Run focused curation contract tests
        run: |
          PYTHONPATH=src python -m pytest -q \
            nutev_tests/test_curation_outputs.py \
            nutev_tests/test_metadata_master_contract.py \
            nutev_tests/test_prisma_flow.py \
            nutev_tests/test_master_pipeline_dedup.py \
            -p no:timeout
