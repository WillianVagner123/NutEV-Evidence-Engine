name: nutev-tests

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  prepare:
    # For the `/nutev-tests` comment trigger, only run for authorized authors
    # (OWNER / MEMBER / COLLABORATOR). This prevents arbitrary external comments
    # from consuming Actions or executing code from forks.
    if: |
      github.event_name != 'issue_comment' ||
      (
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '/nutev-tests') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    outputs:
      checkout_repository: ${{ steps.resolve.outputs.checkout_repository }}
      checkout_sha: ${{ steps.resolve.outputs.checkout_sha }}
    steps:
      - name: Resolve checkout target
        id: resolve
        uses: actions/github-script@v8
        with:
          script: |
            if (context.eventName === 'issue_comment') {
              const pullNumber = context.payload.issue.number;
              const { data: pull } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pullNumber,
              });
              core.setOutput('checkout_repository', pull.head.repo.full_name);
              core.setOutput('checkout_sha', pull.head.sha);
              core.notice(`Running nutev-tests for PR #${pullNumber} on ${pull.head.repo.full_name}@${pull.head.sha}`);
              return;
            }

            if (context.eventName === 'pull_request') {
              const pull = context.payload.pull_request;
              core.setOutput('checkout_repository', pull.head.repo.full_name);
              core.setOutput('checkout_sha', pull.head.sha);
              return;
            }

            core.setOutput('checkout_repository', `${context.repo.owner}/${context.repo.repo}`);
            core.setOutput('checkout_sha', context.sha);

  engine-and-contracts:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ needs.prepare.outputs.checkout_repository }}
          ref: ${{ needs.prepare.outputs.checkout_sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install project and test deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements/nutev-ci.txt ]; then
            python -m pip install -r requirements/nutev-ci.txt
          else
            python -m pip install \
              'requests>=2.32' \
              'pandas>=2.2' \
              'pypdf>=5.0' \
              'beautifulsoup4>=4.12' \
              'pydantic>=2.10' \
              'openpyxl>=3.1' \
              'pytest>=8.0' \
              'pytest-timeout>=2.3' \
              'pytest-mock>=3.14' \
              'pytest-asyncio>=0.23' \
              'freezegun>=1.5'
          fi
          python -m pip install --no-deps -e .
      - name: Run engine and contract tests
        run: |
          PYTHONPATH=src python -m pytest -q \
            nutev_tests/test_engine_ids.py \
            nutev_tests/test_engine_models.py \
            nutev_tests/test_run_events.py \
            nutev_tests/test_search_job_snapshot.py \
            nutev_tests/test_artifact_manifest.py \
            nutev_tests/test_metadata_master_contract.py

  pipeline-phases:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ needs.prepare.outputs.checkout_repository }}
          ref: ${{ needs.prepare.outputs.checkout_sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install project and test deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements/nutev-ci.txt ]; then
            python -m pip install -r requirements/nutev-ci.txt
          else
            python -m pip install \
              'requests>=2.32' \
              'pandas>=2.2' \
              'pypdf>=5.0' \
              'beautifulsoup4>=4.12' \
              'pydantic>=2.10' \
              'openpyxl>=3.1' \
              'pytest>=8.0' \
              'pytest-timeout>=2.3' \
              'pytest-mock>=3.14' \
              'pytest-asyncio>=0.23' \
              'freezegun>=1.5'
          fi
          python -m pip install --no-deps -e .
      - name: Run pipeline phase tests
        run: |
          PYTHONPATH=src python -m pytest -q \
            nutev_tests/test_nutev_phase2.py \
            nutev_tests/test_synthesis_phase3.py \
            nutev_tests/test_qualification_phase4.py \
            nutev_tests/test_curation_phase5.py

  global-watch-core:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ needs.prepare.outputs.checkout_repository }}
          ref: ${{ needs.prepare.outputs.checkout_sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install project and test deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements/nutev-ci.txt ]; then
            python -m pip install -r requirements/nutev-ci.txt
          else
            python -m pip install \
              'requests>=2.32' \
              'pandas>=2.2' \
              'pypdf>=5.0' \
              'beautifulsoup4>=4.12' \
              'pydantic>=2.10' \
              'openpyxl>=3.1' \
              'pytest>=8.0' \
              'pytest-timeout>=2.3' \
              'pytest-mock>=3.14' \
              'pytest-asyncio>=0.23' \
              'freezegun>=1.5'
          fi
          python -m pip install --no-deps -e .
      - name: Run global watch core tests
        run: |
          PYTHONPATH=src python -m pytest -q \
            nutev_tests/test_global_watch_query_builder.py \
            nutev_tests/test_global_watch_lifestyle_mode_expansion.py \
            nutev_tests/test_global_watch_scoring.py \
            nutev_tests/test_watch_scoring.py \
            nutev_tests/test_watch_diff.py \
            nutev_tests/test_watch_digest.py \
            nutev_tests/test_watch_export.py

  global-watch-io:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ needs.prepare.outputs.checkout_repository }}
          ref: ${{ needs.prepare.outputs.checkout_sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install project and test deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements/nutev-ci.txt ]; then
            python -m pip install -r requirements/nutev-ci.txt
          else
            python -m pip install \
              'requests>=2.32' \
              'pandas>=2.2' \
              'pypdf>=5.0' \
              'beautifulsoup4>=4.12' \
              'pydantic>=2.10' \
              'openpyxl>=3.1' \
              'pytest>=8.0' \
              'pytest-timeout>=2.3' \
              'pytest-mock>=3.14' \
              'pytest-asyncio>=0.23' \
              'freezegun>=1.5'
          fi
          python -m pip install --no-deps -e .
      - name: Run global watch IO and integration tests
        run: |
          PYTHONPATH=src python -m pytest -q \
            nutev_tests/test_watch_capture.py \
            nutev_tests/test_watch_webhook.py \
            nutev_tests/test_watch_pipeline_real.py \
            nutev_tests/test_llm_disabled.py \
            nutev_tests/test_github_action_config.py