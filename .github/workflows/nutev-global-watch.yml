name: NutEV Global Watch
on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 0'
jobs:
  global-watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e .
      - name: Install requirements.txt (optional)
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests
        run: PYTHONPATH=src python -m pytest -q nutev_tests -p no:timeout
      - name: Run global watch
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
          NUTEV_DIGEST_WEBHOOK_URL: ${{ secrets.NUTEV_DIGEST_WEBHOOK_URL }}
          NUTEV_NOTIFY_WEBHOOK: ${{ secrets.NUTEV_NOTIFY_WEBHOOK }}
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          NCBI_TOOL: nutev_pipeline
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
          OPENALEX_MAILTO: ${{ secrets.OPENALEX_MAILTO }}
        run: |
          PYTHONPATH=src python -m nutev.cli global-watch \
            --project-root ./project_output \
            --since-days 7 \
            --mode thesis \
            --web-enabled \
            --official-crawl \
            --capture-enabled \
            --notify-webhook \
            --resume
      - name: Build sanitized artifact
        if: always()
        run: bash .github/scripts/build-safe-artifact.sh project_output artifact_safe

      - name: Upload sanitized artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nutev-global-watch-safe
          path: artifact_safe
          retention-days: 5
          if-no-files-found: warn
