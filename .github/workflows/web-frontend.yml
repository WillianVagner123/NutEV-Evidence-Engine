name: web-frontend

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Detect Vite frontend entry
        id: detect
        shell: bash
        run: |
          if [ -f package.json ] && [ -f index.html ]; then
            echo "has_vite_frontend=true" >> "$GITHUB_OUTPUT"
            echo "Detected root Vite frontend."
          else
            echo "has_vite_frontend=false" >> "$GITHUB_OUTPUT"
            echo "No root Vite frontend entry detected; skipping web build/test checks."
          fi
      - uses: actions/setup-node@v6
        if: steps.detect.outputs.has_vite_frontend == 'true'
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install frontend dependencies
        if: steps.detect.outputs.has_vite_frontend == 'true'
        run: npm ci
      - name: Build frontend
        if: steps.detect.outputs.has_vite_frontend == 'true'
        run: npm run build
      - name: Run frontend tests
        if: steps.detect.outputs.has_vite_frontend == 'true'
        run: npm test