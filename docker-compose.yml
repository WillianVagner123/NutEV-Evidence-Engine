# ============================================================================
# NutEV/NutMEV — local stack.
#
# Builds the lean image (see Dockerfile) and serves the FastAPI app on
# http://localhost:8000 (interactive docs at /docs). Project outputs persist
# in ./data on the host.
#
#   docker compose up -d --build                                   # start API
#   docker compose run --rm nutev --project-root /data --workstreams busca1
#   docker compose run --rm nutev ask --project-root /data "..."   # query the KB
#
# Replaces the former local_deep_research + ollama + searxng stack.
# ============================================================================

services:
  nutev:
    build:
      context: .
      args:
        EXTRAS: "platform"   # add ",dashboard" for the Streamlit UI, or "all"
    image: nutev-nutmev:latest
    container_name: nutev
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      # Uncomment to enable the corresponding capability:
      # OPENALEX_MAILTO: "you@example.com"   # OpenAlex polite pool (faster, kinder)
      # NUTEV_JOURNAL_QUALITY: "1"           # venue-quality + predatory enrichment
      # NUTEV_DISABLE_NETWORK: "1"           # fully offline run
      # ANTHROPIC_API_KEY: ""                # enable `nutev ask` Anthropic backend
      # OPENAI_API_KEY: ""                   # enable `nutev ask` OpenAI backend
      PYTHONUNBUFFERED: "1"
    restart: unless-stopped
