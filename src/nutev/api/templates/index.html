<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NutEV Monitor</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23167a52'/%3E%3Ctext x='16' y='23' font-size='21' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'%3EN%3C/text%3E%3C/svg%3E">
  <style>
    :root{--bg:#f7faf7;--ink:#14231b;--muted:#607064;--brand:#167a52;--brand2:#77b255;--gold:#d9a441;--red:#c0392b;--amber:#b9770e;--line:rgba(20,35,27,.12);--panel:rgba(255,255,255,.92);--shadow:0 18px 50px rgba(22,122,82,.12)}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:radial-gradient(circle at 12% 10%,rgba(119,178,85,.22),transparent 34rem),radial-gradient(circle at 85% 0%,rgba(217,164,65,.14),transparent 32rem),linear-gradient(135deg,#f7faf7,#eef8f0 55%,#fbf8ed);min-height:100vh}
    a{color:var(--brand);text-decoration:none}
    .wrap{width:min(1240px,calc(100% - 32px));margin:0 auto;padding:20px 0 48px}
    .top{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:14px;margin-bottom:20px}
    .brand{display:flex;align-items:center;gap:11px;font-weight:850;letter-spacing:-.02em}
    .logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;color:#fff;font-weight:900;box-shadow:0 10px 24px rgba(22,122,82,.22)}
    .controls{display:flex;flex-wrap:wrap;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
    .pill{border:1px solid var(--line);background:rgba(255,255,255,.8);padding:7px 12px;border-radius:999px;color:var(--muted);font-size:13px;display:inline-flex;align-items:center;gap:7px}
    .dot{width:9px;height:9px;border-radius:50%;background:var(--muted);display:inline-block}
    .dot.ok{background:var(--brand2)} .dot.live{background:#17b06b;box-shadow:0 0 0 0 rgba(23,176,107,.6);animation:pulse 1.4s infinite} .dot.idle{background:var(--gold)} .dot.err{background:var(--red)}
    @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(23,176,107,.55)}70%{box-shadow:0 0 0 9px rgba(23,176,107,0)}100%{box-shadow:0 0 0 0 rgba(23,176,107,0)}}
    button{font:inherit;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink);padding:7px 12px;border-radius:10px;font-size:13px;font-weight:650}
    button.on{background:linear-gradient(135deg,var(--brand),#1a9b66);color:#fff;border-color:transparent}
    select{font:inherit;padding:6px 8px;border-radius:9px;border:1px solid var(--line);background:#fff}
    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:16px}
    .kpi{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow)}
    .kpi .k{font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
    .kpi .v{font-size:30px;font-weight:850;line-height:1.1;margin-top:4px;letter-spacing:-.03em}
    .kpi .s{font-size:12px;color:var(--muted);margin-top:3px}
    .grid2{display:grid;grid-template-columns:1.55fr 1fr;gap:16px;margin-bottom:16px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
    .panel h2{margin:0;padding:14px 18px;font-size:15px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:8px}
    .panel .body{padding:14px 18px}
    .feed{max-height:430px;overflow:auto;padding:8px 10px;font-size:13px}
    .ev{display:grid;grid-template-columns:64px 14px 1fr;gap:9px;align-items:start;padding:6px 8px;border-radius:9px}
    .ev:hover{background:rgba(22,122,82,.05)}
    .ev .t{color:var(--muted);font-variant-numeric:tabular-nums;font-size:12px}
    .ev .b{width:8px;height:8px;border-radius:50%;margin-top:5px;background:var(--brand2)}
    .ev.warning .b{background:var(--amber)} .ev.error .b{background:var(--red)}
    .ev .m .stage{font-weight:750}.ev .m .prov{color:var(--brand);font-weight:700}.ev .m .msg{color:var(--muted)}
    .chips{display:flex;flex-wrap:wrap;gap:7px}
    .chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:rgba(255,255,255,.7);border-radius:999px;padding:5px 10px;font-size:12px}
    .bars{display:flex;flex-direction:column;gap:6px;font-size:12.5px}
    .bar{display:grid;grid-template-columns:118px 1fr 38px;align-items:center;gap:8px}
    .bar .track{height:9px;border-radius:6px;background:rgba(22,122,82,.1);overflow:hidden}
    .bar .fill{height:100%;background:linear-gradient(90deg,var(--brand2),var(--brand))}
    .bar .n{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}
    .tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
    .tabs button.on{background:linear-gradient(135deg,var(--brand),#1a9b66);color:#fff;border-color:transparent}
    .tablewrap{overflow:auto;max-height:520px;border-radius:12px;border:1px solid var(--line)}
    table{border-collapse:collapse;width:100%;font-size:12.5px}
    th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;max-width:340px;overflow:hidden;text-overflow:ellipsis}
    th{position:sticky;top:0;background:#f1f7f2;font-weight:750;z-index:1}
    tr:hover td{background:rgba(22,122,82,.04)}
    .muted{color:var(--muted)} .empty{padding:24px;text-align:center;color:var(--muted)}
    footer{text-align:center;color:var(--muted);margin-top:26px;font-size:13px}
    @media(max-width:880px){.grid2{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><div class="logo">N</div><div>NutEV Monitor<br><span class="muted" style="font-size:12px;font-weight:600">Local evidence engine — live</span></div></div>
    <div class="controls">
      <span class="pill"><span id="healthDot" class="dot"></span><span id="healthText">conectando…</span></span>
      <span class="pill"><span id="liveDot" class="dot"></span><span id="liveText">—</span></span>
      <button id="autoBtn" class="on">⏸ Pausar</button>
      <select id="interval"><option value="2000">2s</option><option value="5000" selected>5s</option><option value="10000">10s</option><option value="30000">30s</option></select>
      <button id="refreshBtn">↻ Atualizar</button>
      <a class="pill" href="/docs">API</a>
      <span class="muted" id="updated"></span>
    </div>
  </div>

  <section class="panel" style="margin-bottom:16px">
    <div class="body" style="display:flex;flex-wrap:wrap;align-items:center;gap:12px">
      <button id="playBtn" class="on" style="font-size:15px;padding:10px 20px">▶ Rodar pipeline</button>
      <button id="stopBtn" style="display:none">■ Parar</button>
      <span class="muted">buscas:</span>
      <label class="chip"><input type="checkbox" class="ws" value="busca1" checked> busca1</label>
      <label class="chip"><input type="checkbox" class="ws" value="busca2a"> busca2a</label>
      <label class="chip"><input type="checkbox" class="ws" value="busca2b"> busca2b</label>
      <label class="chip"><input type="checkbox" class="ws" value="a3"> a3</label>
      <label class="chip" title="Sem isto, roda offline com fontes locais (rápido, sempre funciona)"><input type="checkbox" id="webChk"> buscar na web</label>
      <label class="chip" title="Pontua a qualidade do periódico (precisa de web)"><input type="checkbox" id="jqChk"> qualidade periódico</label>
      <span id="runState" class="pill"><span class="dot"></span><span>ocioso</span></span>
    </div>
  </section>

  <div class="kpis" id="kpis"></div>

  <div class="grid2">
    <section class="panel">
      <h2>Monitor ao vivo <span class="muted" id="feedMeta" style="font-size:12px;font-weight:500"></span></h2>
      <div class="feed" id="feed"><div class="empty">Sem eventos ainda. Rode um pipeline neste project-root.</div></div>
    </section>
    <section class="panel">
      <h2>Provedores</h2>
      <div class="body">
        <div class="chips" id="providers"><span class="muted">—</span></div>
        <div style="margin:14px 0 6px;font-weight:700;font-size:13px">Resultados por provedor</div>
        <div class="bars" id="providerRows"><span class="muted">—</span></div>
      </div>
    </section>
  </div>

  <section class="panel">
    <h2>Dados</h2>
    <div class="body">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap">
        <button id="reportBtn" class="on">📄 Gerar relatório (dissertação/artigos)</button>
        <span id="reportMsg" class="muted" style="font-size:12px"></span>
      </div>
      <div class="tabs" id="tabs"></div>
      <div id="tableMeta" class="muted" style="font-size:12px;margin-bottom:8px"></div>
      <div class="tablewrap"><div id="table"><div class="empty">—</div></div></div>
    </div>
  </section>

  <footer>NutEV/NutMEV — plataforma científica local. Nenhuma recomendação é final sem revisão humana.</footer>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const fmt = n => (typeof n==="number"? n.toLocaleString("pt-BR") : (n==null?"—":esc(n)));
async function api(p){ try{ const r=await fetch(p,{cache:"no-store"}); if(!r.ok) return null; return await r.json(); }catch(e){ return null; } }
const hhmmss = iso => { const d=new Date(iso); return isNaN(d)? "" : d.toLocaleTimeString("pt-BR",{hour12:false}); };

let auto=true, timer=null, intervalMs=5000;
let eventCursor=0, events=[], lastNewAt=0, lastEventIso=null, lastRunning=false;
let activeTab="evidence";
const TABS=[["evidence","Evidências"],["claims","Claims"],["recommendations","Recomendações"],["human-review-queue","Revisão humana"],["artifacts","Artefatos"]];

function kpi(k,v,s){ return `<div class="kpi"><div class="k">${esc(k)}</div><div class="v">${fmt(v)}</div><div class="s">${esc(s||"")}</div></div>`; }

async function loadHealth(){
  const h=await api("/api/health");
  if(h&&h.status==="ok"){ $("healthDot").className="dot ok"; $("healthText").textContent=(h.project_root||"").split("/").slice(-2).join("/")||"ok"; }
  else { $("healthDot").className="dot err"; $("healthText").textContent="API offline"; }
}

async function loadSummary(){
  const s=await api("/api/run-summary"); const g=$("kpis");
  if(!s || s.available===false){
    if(lastRunning){
      const p=await api("/api/run-progress")||{}; const st=p.stages||{};
      const STAGE_PT={provider_started:"buscando",provider_completed:"buscando",provider_empty:"buscando",download_started:"baixando textos",download_progress:"baixando textos",download_completed:"baixando textos",journal_quality_started:"qualidade de periódico",journal_quality_completed:"qualidade de periódico",synthesis_completed:"sintetizando",curation_completed:"finalizando"};
      const etapa=STAGE_PT[p.last_stage]||(p.last_stage||"—");
      const cards=[
        kpi("Status","rodando…","etapa: "+etapa),
        kpi("Consultas c/ resultado", st.provider_completed||0),
        kpi("Consultas vazias", st.provider_empty||0, "normal: essa busca específica não achou nada"),
        kpi("Resultados retornados", p.rows_returned||0, "brutos, antes de remover duplicados"),
      ];
      if(p.download && p.download.total){ cards.push(kpi("Baixando textos", (p.download.done||0)+"/"+p.download.total, "fase lenta: baixa PDFs um a um")); }
      cards.push(kpi("Eventos", p.total||0, "atividade do pipeline"));
      g.innerHTML=cards.join("");
    } else {
      g.innerHTML=kpi("Status","sem run","rode o pipeline");
    }
    return;
  }
  const ws=(s.workstreams||[]).join(", ");
  g.innerHTML=[
    kpi("Status", s.run_status||"—", ws?("workstreams: "+ws):""),
    kpi("Documentos", s.records, (s.curated_unique_documents!=null? s.curated_unique_documents+" únicos curados":"")),
    kpi("Claims", s.evidence_claims_total, `${fmt(s.evidence_claims_supported||0)} apoiados · ${fmt(s.evidence_claims_needs_review||0)} p/ revisão`),
    kpi("Recomendações", s.recommendation_candidates_total, `${fmt(s.recommendation_candidates_ready_review||0)} prontas p/ revisão`),
    kpi("Conflitos", s.conflicting_evidence_total),
    kpi("Downloads", (s.downloads_ok||0), `${fmt(s.downloads_ok||0)} ok · ${fmt(s.downloads_failed||0)} falhos`),
    kpi("Provedores", (s.providers_completed||0)+"/"+(s.providers_started||0), `${fmt(s.providers_empty||0)} vazios · ${fmt(s.providers_failed||0)} falhos`),
  ].join("");
  const rows=s.provider_rows||{}; const ent=Object.entries(rows).sort((a,b)=>b[1]-a[1]); const max=Math.max(1,...ent.map(e=>e[1]));
  $("providerRows").innerHTML = ent.length? ent.map(([k,v])=>`<div class="bar"><span title="${esc(k)}" style="overflow:hidden;text-overflow:ellipsis">${esc(k)}</span><div class="track"><div class="fill" style="width:${Math.round(v/max*100)}%"></div></div><span class="n">${fmt(v)}</span></div>`).join("") : '<span class="muted">—</span>';
}

async function loadProviders(){
  const p=await api("/api/provider-health"); const c=$("providers");
  if(!p||!p.items){ c.innerHTML='<span class="muted">—</span>'; return; }
  c.innerHTML=p.items.map(it=>{ const ok=it.secret_status==="configured"; return `<span class="chip"><span class="dot ${ok?'ok':''}"></span>${esc(it.provider)} <span class="muted">${esc(it.mode||"")}</span></span>`; }).join("");
}

function renderFeed(){
  const f=$("feed");
  if(!events.length){ f.innerHTML='<div class="empty">Sem eventos ainda. Rode um pipeline neste project-root.</div>'; return; }
  f.innerHTML=events.map(e=>{
    const kind=(e.event_kind||"progress");
    const prov=e.provider? `<span class="prov">${esc(e.provider)}</span> ` : "";
    return `<div class="ev ${esc(kind)}"><span class="t">${hhmmss(e.event_at)}</span><span class="b"></span><span class="m"><span class="stage">${esc(e.stage||kind)}</span> ${prov}<span class="msg">${esc(e.message||"")}</span></span></div>`;
  }).join("");
}

async function loadEvents(){
  const r=await api("/api/run-events?offset="+eventCursor+"&limit=200");
  if(!r) return;
  if((r.total||0) < eventCursor){ events=[]; eventCursor=0; const r2=await api("/api/run-events?offset=0&limit=200"); if(r2){ applyEvents(r2); } return; }
  applyEvents(r);
}
function applyEvents(r){
  const fresh=r.items||[];
  if(fresh.length){
    for(const e of fresh) events.unshift(e);
    if(events.length>300) events.length=300;
    lastNewAt=Date.now(); lastEventIso=r.last_event_at||lastEventIso;
    renderFeed();
  }
  eventCursor=r.total||eventCursor;
  $("feedMeta").textContent = r.run_id? ("run "+r.run_id.slice(-12)+" · "+fmt(r.total)+" eventos") : "";
  updateLive();
}
function updateLive(){
  const d=$("liveDot"), t=$("liveText"); const sinceNew=Date.now()-lastNewAt;
  if(lastNewAt && sinceNew<(intervalMs+4000)){ d.className="dot live"; t.textContent="AO VIVO"; }
  else if(lastEventIso){ const age=(Date.now()-new Date(lastEventIso))/1000; d.className="dot idle"; t.textContent= age<120? "ativo agora" : ("ocioso · último evento "+(age<3600? Math.round(age/60)+"min":"há tempo")); }
  else { d.className="dot"; t.textContent="sem run"; }
}

function renderTabs(){ $("tabs").innerHTML=TABS.map(([k,l])=>`<button data-tab="${k}" class="${k===activeTab?'on':''}">${esc(l)}</button>`).join(""); }
async function loadTab(){
  const r=await api("/api/"+activeTab+(activeTab.includes("?")?"&":"?")+"limit=25");
  const meta=$("tableMeta"), box=$("table");
  if(!r || r.available===false || !(r.items||[]).length){ meta.textContent=""; box.innerHTML='<div class="empty">Sem dados para esta aba ainda.</div>'; return; }
  const items=r.items; const cols=Object.keys(items[0]).slice(0,9);
  meta.textContent=`${fmt(r.total!=null?r.total:items.length)} registros (mostrando ${items.length})`;
  box.innerHTML=`<table><thead><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr></thead><tbody>${
    items.map(row=>`<tr>${cols.map(c=>`<td title="${esc(row[c])}">${esc(row[c])}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
}

async function loadRunStatus(){
  const s=await api("/api/run/status"); const play=$("playBtn"), stop=$("stopBtn"), rs=$("runState");
  lastRunning=!!(s&&s.running);   // so the STATUS card can show "rodando…" before the summary exists
  if(s && s.running){
    play.disabled=true; play.textContent="● rodando…"; play.classList.remove("on"); stop.style.display="";
    rs.innerHTML='<span class="dot live"></span><span>rodando (pid '+esc(s.pid)+')</span>';
  } else {
    play.disabled=false; play.textContent="▶ Rodar pipeline"; play.classList.add("on"); stop.style.display="none";
    let txt="ocioso", cls="";
    if(s && s.returncode!=null){ const ok=s.returncode===0; txt=ok?"último run: concluído ✓":"último run: erro ("+s.returncode+")"; cls=ok?"ok":"err"; }
    rs.innerHTML='<span class="dot '+cls+'"></span><span>'+esc(txt)+'</span>';
  }
}
async function runStart(){
  const ws=[...document.querySelectorAll(".ws:checked")].map(c=>c.value);
  if(!ws.length){ alert("Selecione ao menos uma busca."); return; }
  $("playBtn").disabled=true; $("playBtn").textContent="iniciando…";
  const r=await fetch("/api/run",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({workstreams:ws,web_enabled:$("webChk").checked,journal_quality:$("jqChk").checked})});
  if(!r.ok){ const e=await r.json().catch(()=>({})); alert("Não foi possível iniciar: "+((e&&e.detail)||r.status)); await loadRunStatus(); return; }
  // Re-sync the feed to the new run: run_events.jsonl is append-only, so move the
  // cursor to the current EOF and only show events appended from now on.
  const cur=await api("/api/run-events?offset=0&limit=1");
  eventCursor=(cur&&typeof cur.total==="number")?cur.total:eventCursor; events=[]; renderFeed();
  if(!auto){ auto=true; $("autoBtn").textContent="⏸ Pausar"; $("autoBtn").classList.add("on"); schedule(); }
  await tick();
}
async function runStop(){ await fetch("/api/run/stop",{method:"POST"}); await loadRunStatus(); }

let ticking=false;
async function tick(){
  if(ticking) return;   // guard: overlapping polls would double-append events to the feed
  ticking=true;
  try{ await Promise.all([loadHealth(),loadSummary(),loadProviders(),loadEvents(),loadRunStatus(),loadTab()]); $("updated").textContent="atualizado "+new Date().toLocaleTimeString("pt-BR",{hour12:false}); }
  finally{ ticking=false; }
}
function schedule(){ if(timer) clearInterval(timer); if(auto) timer=setInterval(tick,intervalMs); }

$("autoBtn").onclick=()=>{ auto=!auto; $("autoBtn").textContent=auto?"⏸ Pausar":"▶ Retomar"; $("autoBtn").classList.toggle("on",auto); schedule(); };
$("refreshBtn").onclick=tick;
$("interval").onchange=e=>{ intervalMs=+e.target.value; schedule(); };
$("tabs").onclick=e=>{ const b=e.target.closest("button[data-tab]"); if(!b) return; activeTab=b.dataset.tab; renderTabs(); loadTab(); };
$("playBtn").onclick=runStart;
$("stopBtn").onclick=runStop;
$("reportBtn").onclick=async()=>{
  const b=$("reportBtn"), msg=$("reportMsg"); b.disabled=true; const old=b.textContent; b.textContent="gerando…"; msg.textContent="";
  try{
    const r=await fetch("/api/report",{method:"POST"}); const d=await r.json().catch(()=>({}));
    if(d&&d.available){ msg.innerHTML="✅ "+esc(d.n_documents)+" documentos → pasta <b>09_report/</b>: comece pelo <b>INDICE.md</b> · planilha <b>NUTEV_DISSERTACAO.xlsx</b> (abas) · referências .bib/.ris · relatório .md/.docx ("+esc((d.written||[]).length)+" arquivos)"; }
    else { msg.textContent="⚠ "+((d&&d.message)||"rode o pipeline primeiro"); }
  }catch(e){ msg.textContent="⚠ falha ao gerar"; }
  b.disabled=false; b.textContent=old;
};

renderTabs(); tick(); schedule();
</script>
</body>
</html>
